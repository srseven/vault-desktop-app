# VAULT macOS App - Build Configuration
# Run: npm run build

appId: com.vault.macos
productName: VAULT

directories:
  output: dist
  buildResources: resources

files:
  - electron/**/*
  - ../index.html
  - ../static/**/*
  - ../manifest.json
  - ../favicon.ico

mac:
  category: public.app-category.entertainment
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: electron/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/entitlements.plist
  entitlementsInherit: electron/entitlements.plist

dmg:
  title: "VAULT - RealDebrid Media Player"
  iconSize: 100
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  releaseType: release
